<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta http-equiv="X-UA-Compatible" content="ie=edge" />
	<title>Image To ASCII</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Inter', sans-serif;
			background: #0f172a;
			color: #f8fafc;
			min-height: 100vh;
			padding: 30px 16px;
			display: flex;
			justify-content: center;
		}

		.container {
			width: 100%;
			max-width: 900px;
		}

		.card {
			background: rgba(15, 23, 42, 0.8);
			border: 1px solid rgba(255, 255, 255, 0.08);
			backdrop-filter: blur(10px);
			border-radius: 24px;
			padding: 24px;
			box-shadow:
				0 10px 30px rgba(0, 0, 0, 0.35),
				inset 0 1px 0 rgba(255, 255, 255, 0.05);
		}

		h1 {
			font-size: 32px;
			font-weight: 700;
			margin-bottom: 8px;
			background: linear-gradient(90deg, #38bdf8, #818cf8);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		.subtitle {
			color: #94a3b8;
			margin-bottom: 28px;
			font-size: 14px;
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			gap: 18px;
			margin-bottom: 24px;
		}

		.field {
			display: flex;
			flex-direction: column;
			gap: 10px;
		}

		label {
			font-size: 14px;
			font-weight: 600;
			color: #cbd5e1;
		}

		select,
		input[type="number"],
		input[type="range"] {
			width: 100%;
			background: #111827;
			border: 1px solid #334155;
			color: white;
			border-radius: 12px;
			padding: 12px;
			outline: none;
			transition: 0.2s;
		}

		select:focus,
		input:focus {
			border-color: #60a5fa;
			box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
		}

		input[type="checkbox"] {
			width: 20px;
			height: 20px;
			accent-color: #60a5fa;
		}

		.checkbox-row {
			display: flex;
			align-items: center;
			gap: 10px;
			margin-top: 12px;
		}

		.upload-box {
			border: 2px dashed #334155;
			border-radius: 20px;
			padding: 30px;
			text-align: center;
			background: rgba(255, 255, 255, 0.02);
			margin-bottom: 24px;
			transition: 0.2s;
		}

		.upload-box:hover {
			border-color: #60a5fa;
			background: rgba(96, 165, 250, 0.05);
		}

		input[type="file"] {
			color: #cbd5e1;
		}

		.actions {
			display: flex;
			align-items: center;
			justify-content: space-between;
			flex-wrap: wrap;
			gap: 12px;
			margin-bottom: 18px;
		}

		button {
			background: linear-gradient(135deg, #3b82f6, #6366f1);
			color: white;
			border: none;
			padding: 12px 20px;
			border-radius: 14px;
			font-weight: 600;
			cursor: pointer;
			transition: 0.2s;
		}

		button:hover {
			transform: translateY(-2px);
			opacity: 0.95;
		}

		#char-count {
			color: #60a5fa;
			font-weight: 700;
		}

		#output {
			width: 100%;
			min-height: 350px;
			background: #020617;
			border: 1px solid #1e293b;
			border-radius: 18px;
			padding: 18px;
			overflow: auto;
			white-space: pre;
			font-family: monospace;
			font-size: 10px;
			line-height: 1;
			color: #e2e8f0;
		}

		.section-title {
			font-size: 15px;
			font-weight: 700;
			margin-bottom: 14px;
			color: #f1f5f9;
		}

		.badge {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			background: rgba(59, 130, 246, 0.12);
			border: 1px solid rgba(96, 165, 250, 0.2);
			color: #93c5fd;
			padding: 8px 12px;
			border-radius: 999px;
			font-size: 13px;
			margin-bottom: 20px;
		}

		@media (max-width: 600px) {
			h1 {
				font-size: 26px;
			}

			.card {
				padding: 18px;
			}

			#output {
				font-size: 8px;
			}
		}
	</style>
</head>

<body>

	<div class="container">
		<div class="card">

			<h1>IMAGE TO ASCII</h1>
			<p class="subtitle">
				Convert gambar jadi ASCII art dengan tampilan modern ✨
			</p>

			<div class="badge">
				Recommended: High • 200 • Invert
			</div>

			<div class="section-title">Settings</div>

			<div class="grid">

				<div class="field">
					<label for="dither">Dither Mode</label>
					<select id="dither">
						<option value="floydSteinberg">Low</option>
						<option value="stucki">Medium</option>
						<option value="atkinson">High</option>
						<option value="threshold">None</option>
					</select>
				</div>

				<div class="field">
					<label for="threshold">Threshold</label>
					<input type="range" id="threshold" min="0" max="254" value="127">
				</div>

				<div class="field">
					<label for="width">Width (max 500)</label>
					<input type="number" id="width" value="100" step="10">
				</div>

				<div class="field">
					<label for="font-size">Preview Font Size</label>
					<input type="number" id="font-size" value="10">
				</div>

			</div>

			<div class="checkbox-row">
				<input type="checkbox" id="invert">
				<label for="invert">Invert Output</label>
			</div>

			<br>

			<div class="section-title">Upload Image</div>

			<div class="upload-box">
				<input type="file" id="filepicker" accept=".png,.jpeg,.jpg">
			</div>

			<div class="actions">
				<button id="copy">Copy ASCII</button>

				<div>
					<span id="char-count">0</span> characters
				</div>
			</div>

			<div id="output" contenteditable="true"></div>

		</div>
	</div>

	<script src="dist/index.js?v=3" type="module"></script>

</body>

</html>
